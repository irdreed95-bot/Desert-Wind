name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 8

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Install Dependencies
      run: pnpm install

    - name: Build Web App Target
      run: pnpm build

    - name: Install Cordova Globally
      run: npm install -g cordova

    - name: Wrap Web App and Build APK
      run: |
        # إنشاء مشروع كوردوفا مؤقت لعملية التغليف
        cordova create cordova-app com.alyanabee.whitewolf "متجر الذيب الأبيض"
        cd cordova-app
        cordova platform add android
        
        # تنظيف مجلد الويب الافتراضي لكوردوفا
        rm -rf www/*
        
        # نسخ ملفات موقعك بعد البناء (تأكد إذا كان المجلد الناتج اسمه dist أو build أو out)
        # الكود أدناه سيبحث تلقائياً عن المجلد وينسخه لمجلد التطبيق
        if [ -d "../dist" ]; then cp -r ../dist/* www/; 
        elif [ -d "../build" ]; then cp -r ../build/* www/; 
        elif [ -d "../out" ]; then cp -r ../out/* www/; 
        fi
        
        # نسخ الأيقونات إذا قمت برفعها في المجلد الرئيسي res
        if [ -d "../res" ]; then
          cp -r ../res .
        fi
        
        # بناء ملف الـ APK
        cordova build android --device

    - name: Upload Generated APK to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: WhiteWolf-Android-APK
        path: cordova-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
